        rel="stylesheet" />

    <style>
        /* Specific styles for blog post reading experience */
        .post-container {
            max-width: 760px;
            margin: 0 auto;
            padding-bottom: 120px;
        }

        .post-header {
            margin-bottom: 64px;
        }

        .post-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 24px;
            font-size: 13px;
            color: var(--text-muted);
            letter-spacing: -0.01em;
            font-weight: 500;
        }

        .post-category {
            color: var(--accent);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
        }

        .post-title {
            font-size: clamp(32px, 5vw, 48px);
            font-weight: 800;
            letter-spacing: -0.045em;
            line-height: 1.1;
            color: var(--text-primary);
        }

        .post-content {
            font-size: 18px;
            line-height: 1.8;
            color: var(--text-secondary);
            letter-spacing: -0.012em;
        }

        .post-content h3 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.03em;
            margin: 48px 0 20px;
            color: var(--text-primary);
        }

        .post-content p {
            margin-bottom: 28px;
        }

        /* Go back link */
        .back-to-blog {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 40px;
            transition: color 0.2s;
            text-decoration: none;
            font-weight: 600;
        }

        .back-to-blog:hover {
            color: var(--accent);
        }

        .divider-full {
            height: 1px;
            background: var(--border);
            margin: 64px 0;
        }
    </style>
</head>
